services:
  - type: web
    name: padel-stats
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r dashboard/requirements.txt
    startCommand: cd dashboard && gunicorn api:app --workers 1 --timeout 300 --preload --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: padel-db
          property: connectionString
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: padel-db
    plan: free
    region: frankfurt
    databaseName: padel
    user: padel
