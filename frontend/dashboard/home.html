<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Padel Stats</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
<script>
tailwind.config={theme:{extend:{colors:{ink:'#0F141B',panel:'#1A222C',
  brand:{DEFAULT:'#0E9C86',dark:'#0A7766',soft:'#E6F4F1'},paper:'#F5F6F7',line:'#E7E9EC',muted:'#697483'}}}}
</script>
<style>
  body{font-family:'Inter',sans-serif;background:#F5F6F7;color:#15191F}
  .num{font-variant-numeric:tabular-nums;letter-spacing:-.01em}.pct-font{font-family:'Outfit',sans-serif;font-variant-numeric:tabular-nums}
  .card{background:#fff;border:1px solid #E7E9EC;border-radius:14px}
  .lbl{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:#9aa3af;font-weight:600}
  .nav{display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:9px;color:rgba(255,255,255,.6);font-weight:500}
  .nav:hover{background:rgba(255,255,255,.05);color:#fff}.nav.active{background:rgba(14,156,134,.16);color:#13C2A6}
  .nav svg{width:18px;height:18px;flex-shrink:0}
  @media(max-width:1023px){.nav span,.side-lbl,.brand-txt{display:none}.nav{justify-content:center;padding:10px 0}}
</style>
</head>
<body class="antialiased">
<aside class="w-14 lg:w-60 bg-ink text-white min-h-screen fixed left-0 top-0 flex flex-col p-2 lg:p-4 z-30">
  <a href="/" class="flex items-center gap-2 px-1 lg:px-2 py-2 mb-3"><span class="w-8 h-8 rounded-lg bg-brand text-white grid place-items-center text-sm font-700 shrink-0">P</span><span class="brand-txt font-700">Padel<span class="text-brand">Stats</span></span></a>
  <nav class="flex flex-col gap-1 text-sm">
    <div class="side-lbl text-[10px] uppercase tracking-wider font-600 px-3 py-2 text-white/30">Général</div>
    <a href="/" class="nav active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg><span>Tableau de bord</span></a>
    <a href="/classement" class="nav"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 21h8M12 17v4M7 4h10v4a5 5 0 0 1-10 0V4ZM5 4H3v3a3 3 0 0 0 3 3M19 4h2v3a3 3 0 0 1-3 3"/></svg><span>Classement</span></a>
    <a href="/tournois" class="nav"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h10"/></svg><span>Tournois</span></a>
    <a href="/clubs" class="nav"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21V8l9-5 9 5v13M3 21h18M9 21v-6h6v6"/></svg><span>Clubs</span></a>
    <div class="side-lbl text-[10px] uppercase tracking-wider font-600 px-3 py-2 mt-3 text-white/30">Exploration</div>
    <a href="/carte" class="nav"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-6-5.7-6-10a6 6 0 1 1 12 0c0 4.3-6 10-6 10Z"/><circle cx="12" cy="11" r="2"/></svg><span>Carte</span></a>
    <a href="/graphe" class="nav"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="2.5"/><circle cx="18" cy="7" r="2.5"/><circle cx="12" cy="18" r="2.5"/><path d="M8 7.5 16 8M7.5 8l3.5 8M16.5 9l-3.5 7"/></svg><span>Graphe</span></a>
  </nav>
</aside>
<div class="ml-14 lg:ml-60 min-w-0">
  <header class="sticky top-0 z-20 bg-white/90 backdrop-blur border-b border-line">
    <div class="px-5 lg:px-8 h-14 flex items-center gap-3">
      <div id="searchwrap" class="relative w-full max-w-md">
        <div class="flex items-center gap-2 h-9 px-3 rounded-lg border border-line bg-white">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#697483" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg>
          <input id="searchbox" class="flex-1 text-sm outline-none bg-transparent" placeholder="Rechercher un joueur…" autocomplete="off">
        </div>
        <div id="searchres" class="hidden absolute mt-1 w-full bg-white border border-line rounded-lg overflow-hidden z-30 shadow-sm"></div>
      </div>
    </div>
  </header>
  <main class="px-5 lg:px-8 py-6">
    <section class="rounded-2xl overflow-hidden text-white" style="background:linear-gradient(120deg,#0a2e29 0%,#0e7c66 56%,#13b89e 100%)">
      <div class="p-7 sm:p-8">
        <h1 class="font-800 text-3xl sm:text-4xl tracking-tight">Padel Stats</h1>
        <p class="text-white/80 mt-1 text-sm">Statistiques du padel français (FFT) — classements, tournois, clubs, graphe de jeu.</p>
        <div class="mt-5 grid grid-cols-2 lg:grid-cols-4 gap-3" id="kpi"></div>
      </div>
    </section>

    <section class="mt-5 grid lg:grid-cols-2 gap-4">
      <div class="card p-5">
        <div class="flex items-center justify-between mb-3"><h2 class="font-700 text-base">Top Messieurs</h2><a href="/classement" class="text-xs text-brand-dark font-600 hover:underline">Tout le classement →</a></div>
        <div class="space-y-1" id="top-h"></div>
      </div>
      <div class="card p-5">
        <div class="flex items-center justify-between mb-3"><h2 class="font-700 text-base">Top Dames</h2><a href="/classement" class="text-xs text-brand-dark font-600 hover:underline">Tout le classement →</a></div>
        <div class="space-y-1" id="top-f"></div>
      </div>
    </section>

    <section class="mt-5">
      <div class="lbl mb-3">Explorer</div>
      <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-3" id="links"></div>
    </section>
  </main>
</div>
<script>
const tc=s=>(s||'').toLowerCase().replace(/(^|[\s'-])\p{L}/gu,m=>m.toUpperCase());
const fr=n=>(n==null?'—':Number(n).toLocaleString('fr-FR'));
const ini=s=>(s||'').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
const debounce=(fn,d=280)=>{let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),d)}};
const $=id=>document.getElementById(id);

const sb=$('searchbox'),sr=$('searchres');
sb.addEventListener('input',debounce(async e=>{
  const q=e.target.value.trim(); if(q.length<2){sr.classList.add('hidden');return;}
  let d={joueurs:[],clubs:[],villes:[]}; try{d=await fetch('/api/search_all?q='+encodeURIComponent(q)).then(r=>r.json());}catch(_){}
  const sec=t=>`<div class="px-3 pt-2 pb-1 text-[10px] uppercase tracking-wider text-muted font-600 border-t border-line first:border-0">${t}</div>`;
  let h='';
  if((d.joueurs||[]).length) h+=sec('Joueurs')+d.joueurs.map(p=>`<a href="/joueur/${p.id}" class="flex items-center justify-between gap-2 px-3 py-2 hover:bg-paper text-sm"><span class="font-500 truncate">${tc(p.nom_complet)}</span><span class="text-[11px] text-muted shrink-0 num">#${p.classement} · ${p.sexe}</span></a>`).join('');
  if((d.clubs||[]).length) h+=sec('Clubs')+d.clubs.map(o=>`<a href="/club?nom=${encodeURIComponent(o.nom)}" class="flex items-center justify-between gap-2 px-3 py-2 hover:bg-paper text-sm"><span class="font-500 truncate">${tc(o.nom)}</span><span class="text-[11px] text-muted shrink-0">${o.nb} licenciés</span></a>`).join('');
  if((d.villes||[]).length) h+=sec('Villes')+d.villes.map(v=>`<a href="/classement?ville=${encodeURIComponent(v.nom)}" class="flex items-center justify-between gap-2 px-3 py-2 hover:bg-paper text-sm"><span class="font-500 truncate">${tc(v.nom)}${v.dept_num?` <span class="text-muted">(${v.dept_num})</span>`:''}</span><span class="text-[11px] text-muted shrink-0">${v.nb} joueurs</span></a>`).join('');
  if(!h){sr.classList.add('hidden');return;}
  sr.innerHTML=h; sr.classList.remove('hidden');
}));
document.addEventListener('click',e=>{ if(!e.target.closest('#searchwrap')) sr.classList.add('hidden'); });

function rowJoueur(p,i){
  return `<a href="/joueur/${p.id_fft}" class="flex items-center gap-3 px-2 py-1.5 rounded-lg hover:bg-paper">
    <span class="num font-700 text-muted w-5 text-center">${i+1}</span>
    <span class="w-8 h-8 shrink-0 rounded-lg bg-brand-soft text-brand-dark grid place-items-center text-[11px] font-700">${ini((p.prenom||'')+' '+(p.nom||''))}</span>
    <span class="min-w-0 flex-1"><span class="text-sm font-500 block truncate">${tc((p.prenom||'')+' '+(p.nom||''))}</span><span class="text-[11px] text-muted truncate block">${p.club_nom?tc(p.club_nom):(p.comite?tc(p.comite):'')}</span></span>
    <span class="num text-sm font-700">${p.classement}<span class="text-muted text-xs">e</span></span></a>`;
}

const LINKS=[
  ['Classement','/classement','Tous les joueurs H/F, filtres région, club…','M8 21h8M12 17v4M7 4h10v4a5 5 0 0 1-10 0V4ZM5 4H3v3a3 3 0 0 0 3 3M19 4h2v3a3 3 0 0 1-3 3'],
  ['Tournois','/tournois','Les tournois les plus relevés, par niveau','M4 6h16M4 12h16M4 18h10'],
  ['Carte','/carte','Répartition par département et commune','M12 21s-6-5.7-6-10a6 6 0 1 1 12 0c0 4.3-6 10-6 10ZM12 9a2 2 0 1 0 0 4 2 2 0 0 0 0-4Z'],
  ['Graphe','/graphe','Réseau de partenaires & degrés de séparation','M6 6m-2.5 0a2.5 2.5 0 1 0 5 0a2.5 2.5 0 1 0-5 0M18 7m-2.5 0a2.5 2.5 0 1 0 5 0a2.5 2.5 0 1 0-5 0M12 18m-2.5 0a2.5 2.5 0 1 0 5 0a2.5 2.5 0 1 0-5 0'],
];
$('links').innerHTML=LINKS.map(([t,href,d,p])=>`<a href="${href}" class="card p-4 hover:border-brand transition-colors">
  <div class="w-9 h-9 rounded-lg bg-brand-soft text-brand-dark grid place-items-center mb-3"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="${p}"/></svg></div>
  <div class="font-600 text-sm">${t}</div><div class="text-[12px] text-muted mt-0.5 leading-snug">${d}</div></a>`).join('');

async function load(){
  let d={}; try{ d=await fetch('/api/home').then(r=>r.json()); }catch(_){}
  const c=d.counts||{};
  const kpi=[['Joueurs classés (H)',fr(c.nb_h)],['Joueuses classées (F)',fr(c.nb_f)],['Clubs',fr(c.nb_clubs)],['Tournois',fr(c.nb_tournois)]];
  $('kpi').innerHTML=kpi.map(([l,v])=>`<div class="rounded-xl bg-white/10 px-4 py-3"><div class="pct-font font-800 text-2xl">${v}</div><div class="text-[11px] text-white/70 mt-0.5">${l}</div></div>`).join('');
  $('top-h').innerHTML=(d.top_h||[]).map(rowJoueur).join('')||'<div class="text-sm text-muted px-2 py-3">—</div>';
  $('top-f').innerHTML=(d.top_f||[]).map(rowJoueur).join('')||'<div class="text-sm text-muted px-2 py-3">—</div>';
}
load();
</script>
</body>
</html>
