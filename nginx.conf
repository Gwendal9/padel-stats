events {}

http {
    # Compression gzip
    gzip on;
    gzip_types application/json text/html text/css application/javascript;
    gzip_min_length 1000;
    gzip_comp_level 5;

    server {
        listen 80;

        # Timeout aligné sur gunicorn (routes lourdes comme /api/ego)
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;

        location / {
            proxy_pass         http://padel:5000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Buffer : Nginx absorbe la réponse complète avant d'envoyer au client
            # → libère gunicorn plus vite
            proxy_buffering    on;
            proxy_buffer_size  16k;
            proxy_buffers      8 16k;
        }
    }
}
